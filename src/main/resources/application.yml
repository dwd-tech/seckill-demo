server:
  port: 8080

spring:
  application:
    name: seckill-demo

  # 数据库连接
  datasource:
    url: jdbc:mysql://localhost:3306/seckill_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA 运行配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Redis 数据源
  redis:
    host: localhost
    port: 6379

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: seckill-prod-group